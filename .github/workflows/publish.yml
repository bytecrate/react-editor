name: Publish Package
on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        run: npm version ${{ inputs.version_type }}

      - name: Build
        run: npm run build

      - name: Publish to NPM
        run: npm publish --provenance

      # master requires PRs (ruleset). Push the version commit + tag to a
      # release branch and open a PR so master can be updated via review.
      - name: Push release branch and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BRANCH="release/v${VERSION}"
          DEFAULT_BRANCH=$(gh repo view --json defaultBranchRef --jq '.defaultBranchRef.name')

          git checkout -b "$BRANCH"
          git push -u origin "HEAD:${BRANCH}" --follow-tags

          if [ "$(gh pr list --head "$BRANCH" --base "$DEFAULT_BRANCH" --state open --json number --jq 'length')" = "0" ]; then
            BODY=$(printf '%s\n' \
              "Automated release after publishing \`@bytecrate/react-editor@${VERSION}\` to npm." \
              "" \
              "- Version bump is on branch \`${BRANCH}\`" \
              "- Tag \`v${VERSION}\` was pushed with this release" \
              "" \
              "Merge this PR so \`${DEFAULT_BRANCH}\` stays in sync with the published package.")
            gh pr create \
              --base "$DEFAULT_BRANCH" \
              --head "$BRANCH" \
              --title "chore: release v${VERSION}" \
              --body "$BODY"
          else
            echo "Open PR already exists for ${BRANCH}"
          fi
